# ANSI green (palette 2) and ANSI blue (palette 4) are remapped to
# Industrial Yellow (#FFCA40) so Omarchy startup logos and tmux
# selectors render with the brand accent.
# ANSI cyan slots (6, 14) are remapped to function green (#8EFA8D)
# and bright blue (12) to type purple (#B57EDC) to comply with the
# no-cold-cyan / no-blue contract from theme-specs.md.
# [FIX] green/blue -> yellow; cyan/lavender -> function green / type purple.
background = 0C0011
foreground = FAF3F0

palette = 0=#1E1025
palette = 1=#E04C4C
palette = 2=#FFCA40
palette = 3=#FFCA40
palette = 4=#FFCA40
palette = 5=#FF99C8   # keyword pink (was muted red)
palette = 6=#8EFA8D   # function/command/success (was cold cyan)
palette = 7=#FAF3F0   # foreground

palette = 8=#737373   # invisibles / structure
palette = 9=#F5735A   # property / param / flag
palette = 10=#C8FF36  # number / bool / const
palette = 11=#C8FF36  # number / bool / const
palette = 12=#B57EDC  # type (was lavender)
palette = 13=#FF99C8  # keyword pink
palette = 14=#8EFA8D  # function/command/success (was cold cyan)
palette = 15=#FAF3F0  # foreground (was pure white #FFFFFF)

cursor-color = FFCA40
cursor-text = 0C0011
# Selection: Industrial Yellow on Carbon. [FIX] purple -> yellow because
# terminal/tmux selectors consume this slot.
selection-background = FFCA40
selection-foreground = 0C0011