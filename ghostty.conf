# Carbon Vandal — Ghostty terminal.
#
# ANSI normal (palette 0-7): green, yellow, and blue all resolve to
# Industrial Yellow. Several terminal UIs — the Omarchy startup logo,
# tmux selectors — render focus through those specific slots, so leaving
# them at stock green/olive/blue would make the logo and selectors read
# the wrong color on this theme. Cyan carries function/success green
# instead of a cold cyan, per the no-cold-color rule in theme-specs.md.
background = 0C0011
foreground = FAF3F0

palette = 0=#1E1025
palette = 1=#E04C4C
palette = 2=#FFCA40
palette = 3=#FFCA40
palette = 4=#FFCA40
palette = 5=#FF99C8
palette = 6=#8EFA8D
palette = 7=#FAF3F0

palette = 8=#737373
palette = 9=#F5735A
palette = 10=#C8FF36
palette = 11=#C8FF36
palette = 12=#B57EDC
palette = 13=#FF99C8
palette = 14=#8EFA8D
palette = 15=#FAF3F0

cursor-color = FFCA40
cursor-text = 0C0011

# Selection: Industrial Yellow on Carbon, same focus color as the cursor
# and terminal selectors above.
selection-background = FFCA40
selection-foreground = 0C0011
