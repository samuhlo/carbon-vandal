[colors]
[colors.primary]
background = '#0C0011'
foreground = '#FAF3F0'

# ANSI green/blue are intentionally remapped to yellow brand surfaces.
# Omarchy startup logos, tmux selectors and terminal UIs consume ANSI
# green and ANSI blue slots to render focus, so they must read yellow,
# not olive/green and not muted purple. [FIX] green/blue -> industrial yellow.

[colors.normal]
black   = "#1E1025"
red     = "#E04C4C"
green   = "#FFCA40"
yellow  = "#FFCA40"
blue    = "#FFCA40"
magenta = "#FF6D6E"
cyan    = "#2EC4D6"
white   = "#FAF3F0"

[colors.bright]
black   = "#737373"
red     = "#F5735A"
green   = "#C8FF36"
yellow  = "#C8FF36"
blue    = "#C9A6E8"
magenta = "#FF99C8"
cyan    = "#5FE0E8"
white   = "#FFFFFF"

[colors.cursor]
text   = "#0C0011"
cursor = "#FFCA40"

[colors.selection]
text = "#0C0011"
background = "#FFCA40"