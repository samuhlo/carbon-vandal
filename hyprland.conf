# Carbon Vandal — Hyprland focus border.
# Industrial Yellow marks the active window so focus is the only thing
# that reads as a different color on an otherwise single-surface desktop.
$activeBorderColor = rgb(ffca40)

general {
    col.active_border = $activeBorderColor
}

# Grouped/tabbed windows have their own border color slot — without this,
# a focused window inside a group falls back to Hyprland's default border
# instead of the theme accent.
group {
    col.border_active = $activeBorderColor
}