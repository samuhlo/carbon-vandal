## name: Carbon Vandal
## license: MIT
## author: Samuhlo
## description: Carbon Vandal theme for Omarchy — Carbon base, Concrete White text, Industrial Yellow accent.
## upstream: https://github.com/samuhlo/carbon-vandal/raw/main/kitty.conf


# Selection: Industrial Yellow on Carbon. [FIX] purple -> yellow because
# tmux/terminal selectors consume this slot and must read as brand focus.
background #0C0011
foreground #FAF3F0
selection_background #FFCA40
selection_foreground #0C0011
url_color #2EC4D6
cursor #FFCA40
cursor_text_color #0C0011

# Tabs
active_tab_background #FFCA40
active_tab_foreground #0C0011
inactive_tab_background #1E1025
inactive_tab_foreground #737373
#tab_bar_background #0C0011

# Windows
active_border_color #FFCA40
inactive_border_color #1E1025

# normal
# [FIX] color2 (green) and color4 (blue) remapped to Industrial Yellow.
# Omarchy startup logos and tmux selectors render through these ANSI
# slots, so they must read yellow, not olive or muted purple.
color0 #1E1025
color1 #E04C4C
color2 #FFCA40
color3 #FFCA40
color4 #FFCA40
color5 #FF6D6E
color6 #2EC4D6
color7 #FAF3F0

# bright
color8 #737373
color9 #F5735A
color10 #C8FF36
color11 #C8FF36
color12 #C9A6E8
color13 #FF99C8
color14 #5FE0E8
color15 #FFFFFF

# extended colors
color16 #FFA64A
color17 #FF6D6E