## name: Carbon Vandal
## license: MIT
## author: Samuhlo
## description: Carbon Vandal theme for Omarchy — Carbon base, Concrete White text, Industrial Yellow accent.
## upstream: https://github.com/samuhlo/omarchy-carbon-vandal-theme/raw/main/kitty.conf


# Selection and cursor: Industrial Yellow on Carbon. Terminal selectors
# (tmux, fzf, etc.) consume this slot and read it as the theme's focus
# color.
background #0C0011
foreground #FAF3F0
selection_background #FFCA40
selection_foreground #0C0011
url_color #FFCA40
cursor #FFCA40
cursor_text_color #0C0011

# Tabs
active_tab_background #FFCA40
active_tab_foreground #0C0011
inactive_tab_background #1E1025
inactive_tab_foreground #737373
#tab_bar_background #0C0011

# Windows
active_border_color #FFCA40
inactive_border_color #1E1025

# ANSI normal (color0-7). Green, yellow, and blue all resolve to
# Industrial Yellow: several terminal UIs — the Omarchy startup logo,
# tmux selectors — render focus through those specific slots, so leaving
# them at stock green/olive/blue would make the logo and selectors read
# the wrong color on this theme. Cyan carries function/success green
# instead of a cold cyan, per the no-cold-color rule in theme-specs.md.
color0 #1E1025   # elevated surface
color1 #E04C4C   # error
color2 #FFCA40   # system accent
color3 #FFCA40   # system accent
color4 #FFCA40   # system accent
color5 #FF99C8   # keyword pink
color6 #8EFA8D   # function / success green
color7 #FAF3F0   # foreground

# ANSI bright (color8-15)
color8 #737373   # structure gray
color9 #F5735A   # property / param / flag
color10 #C8FF36  # number / bool / const
color11 #C8FF36  # number / bool / const
color12 #B57EDC  # type purple
color13 #FF99C8  # keyword pink
color14 #8EFA8D  # function / success green
color15 #FAF3F0  # foreground

# Extended palette (color16-17): kitty-specific slots some themes use for
# orange/brown accents. Carbon Vandal keeps them inside its own palette
# (peach and keyword pink) instead of introducing new hues.
color16 #F5735A  # property / param / flag
color17 #FF99C8  # keyword pink
