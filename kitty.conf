## name: Carbon Vandal
## license: MIT
## author: Samuhlo
## description: Carbon Vandal theme for Omarchy — Carbon base, Concrete White text, Industrial Yellow accent.
## upstream: https://github.com/samuhlo/carbon-vandal/raw/main/kitty.conf


# Selection: Industrial Yellow on Carbon. tmux/terminal selectors consume
# this slot and must read as brand focus. [FIX] purple -> yellow.
background #0C0011
foreground #FAF3F0
selection_background #FFCA40
selection_foreground #0C0011
url_color #FFCA40
cursor #FFCA40
cursor_text_color #0C0011

# Tabs
active_tab_background #FFCA40
active_tab_foreground #0C0011
inactive_tab_background #1E1025
inactive_tab_foreground #737373
#tab_bar_background #0C0011

# Windows
active_border_color #FFCA40
inactive_border_color #1E1025

# normal
# color2 (ANSI green) and color4 (ANSI blue) remap to Industrial Yellow
# so Omarchy startup logos and tmux selectors render with the brand accent.
# [FIX] green/blue -> yellow; cyan/lavender -> function green / type purple.
color0 #1E1025   # elevated surface
color1 #E04C4C   # error
color2 #FFCA40   # system accent (ANSI green -> yellow)
color3 #FFCA40   # system accent
color4 #FFCA40   # system accent (ANSI blue -> yellow)
color5 #FF99C8   # keyword pink (was muted red)
color6 #8EFA8D   # function/command/success (was cold cyan)
color7 #FAF3F0   # foreground

# bright
color8 #737373   # invisibles / structure
color9 #F5735A   # property / param / flag
color10 #C8FF36  # number / bool / const
color11 #C8FF36  # number / bool / const
color12 #B57EDC  # type (was lavender)
color13 #FF99C8  # keyword pink
color14 #8EFA8D  # function/command/success (was cold cyan)
color15 #FAF3F0  # foreground (was pure white #FFFFFF)

# extended colors
color16 #F5735A  # property / param / flag (was orange)
color17 #FF99C8  # keyword pink (was muted red)