# Carbon Vandal — mako (notifications).
#
# Layout, timeouts, grouping, and the interactive action rules (Wi-Fi
# setup, Update System, Learn Keybindings, Screenshot copied, etc.) all
# come from Omarchy's shared core.ini — this file only overrides color.
# A theme that copies core.ini's settings by hand instead of including it
# will silently drift out of sync and lose those action rules whenever
# Omarchy updates core.ini.
include=~/.local/share/omarchy/default/mako/core.ini

text-color=#FAF3F0
border-color=#FFCA40
background-color=#1E1025
